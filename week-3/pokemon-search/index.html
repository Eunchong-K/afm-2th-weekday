<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓몬 도감</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-enter { animation: fadeIn 0.3s ease-out both; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ========================================
    // Constants
    // ========================================

    const API_BASE = 'https://pokeapi.co/api/v2';

    // 한국어 이름 → 영어 이름 (부분 검색 지원용)
    const KO_TO_EN = {
      '피카츄': 'pikachu',    '파이리': 'charmander', '꼬부기': 'squirtle',
      '이상해씨': 'bulbasaur', '잠만보': 'snorlax',    '리자드': 'charmeleon',
      '리자몽': 'charizard',  '거북왕': 'blastoise',  '이상해풀': 'ivysaur',
      '이상해꽃': 'venusaur', '뮤츠': 'mewtwo',       '뮤': 'mew',
      '이브이': 'eevee',      '메타몽': 'ditto',       '라프라스': 'lapras',
      '나인테일': 'ninetales', '식스테일': 'vulpix',   '팬텀': 'gengar',
      '망나뇽': 'dragonite',  '미니룡': 'dratini',
    };

    const TYPE_COLORS = {
      normal:   { bg: 'bg-gray-400',    text: 'text-white',      label: 'Normal'   },
      fire:     { bg: 'bg-red-500',     text: 'text-white',      label: 'Fire'     },
      water:    { bg: 'bg-blue-500',    text: 'text-white',      label: 'Water'    },
      electric: { bg: 'bg-yellow-400',  text: 'text-yellow-900', label: 'Electric' },
      grass:    { bg: 'bg-green-500',   text: 'text-white',      label: 'Grass'    },
      ice:      { bg: 'bg-cyan-400',    text: 'text-white',      label: 'Ice'      },
      fighting: { bg: 'bg-orange-600',  text: 'text-white',      label: 'Fighting' },
      poison:   { bg: 'bg-purple-500',  text: 'text-white',      label: 'Poison'   },
      ground:   { bg: 'bg-yellow-600',  text: 'text-white',      label: 'Ground'   },
      flying:   { bg: 'bg-sky-400',     text: 'text-white',      label: 'Flying'   },
      psychic:  { bg: 'bg-pink-500',    text: 'text-white',      label: 'Psychic'  },
      bug:      { bg: 'bg-lime-500',    text: 'text-white',      label: 'Bug'      },
      rock:     { bg: 'bg-stone-500',   text: 'text-white',      label: 'Rock'     },
      ghost:    { bg: 'bg-indigo-600',  text: 'text-white',      label: 'Ghost'    },
      dragon:   { bg: 'bg-violet-600',  text: 'text-white',      label: 'Dragon'   },
      dark:     { bg: 'bg-neutral-700', text: 'text-white',      label: 'Dark'     },
      steel:    { bg: 'bg-slate-400',   text: 'text-white',      label: 'Steel'    },
      fairy:    { bg: 'bg-pink-300',    text: 'text-pink-900',   label: 'Fairy'    },
    };

    // ========================================
    // API Helpers
    // ========================================

    async function fetchPokemonDetail(nameOrId) {
      const res = await fetch(`${API_BASE}/pokemon/${nameOrId}`);
      if (!res.ok) throw new Error('포켓몬을 찾을 수 없습니다.');
      const data = await res.json();

      const speciesRes = await fetch(data.species.url);
      const speciesData = await speciesRes.json();
      const koName = speciesData.names.find(n => n.language.name === 'ko')?.name || data.name;

      const stats = {};
      data.stats.forEach(s => { stats[s.stat.name] = s.base_stat; });

      return {
        id: data.id,
        number: String(data.id).padStart(3, '0'),
        nameKo: koName,
        nameEn: data.name.charAt(0).toUpperCase() + data.name.slice(1),
        types: data.types.map(t => t.type.name),
        imgSrc: data.sprites?.other?.['official-artwork']?.front_default || data.sprites?.front_default,
        hp:      stats['hp']      || 0,
        attack:  stats['attack']  || 0,
        defense: stats['defense'] || 0,
        speed:   stats['speed']   || 0,
      };
    }

    // ========================================
    // Design System Components
    // ========================================

    function Badge({ type }) {
      const c = TYPE_COLORS[type] || { bg: 'bg-gray-300', text: 'text-gray-800', label: type };
      return (
        <span className={`inline-block px-3 py-0.5 rounded-full text-xs font-bold ${c.bg} ${c.text}`}>
          {c.label}
        </span>
      );
    }

    function StatBar({ statKey, value }) {
      const cfg = { hp: { label: 'HP', color: 'bg-green-400' }, attack: { label: '공격', color: 'bg-red-400' }, defense: { label: '방어', color: 'bg-blue-400' }, speed: { label: '스피드', color: 'bg-yellow-400' } }[statKey];
      if (!cfg) return null;
      const pct = Math.min((value / 160) * 100, 100);
      return (
        <div className="flex items-center gap-2 text-sm">
          <span className="w-16 text-gray-500 font-medium text-right">{cfg.label}</span>
          <span className="w-8 text-right font-bold text-gray-700">{value}</span>
          <div className="flex-1 h-2.5 bg-gray-200 rounded-full overflow-hidden">
            <div className={`h-full rounded-full ${cfg.color}`} style={{ width: `${pct}%`, transition: 'width 0.5s ease' }} />
          </div>
        </div>
      );
    }

    // ========================================
    // Pokemon Card Component
    // ========================================

    function PokemonCard({ pokemon, index }) {
      const { number, nameKo, nameEn, types, imgSrc } = pokemon;
      const borderColor = TYPE_COLORS[types[0]]?.bg.replace('bg-', 'border-') || 'border-gray-300';

      return (
        <div
          className={`card-enter bg-white rounded-2xl shadow-md hover:shadow-xl transition-shadow border-t-4 ${borderColor} overflow-hidden`}
          style={{ animationDelay: `${index * 60}ms` }}
        >
          <div className="p-5">
            <div className="flex items-start justify-between mb-3">
              <div>
                <p className="text-gray-400 text-xs font-mono">#{number}</p>
                <h2 className="text-xl font-bold text-gray-800">{nameKo}</h2>
                <p className="text-sm text-gray-500">{nameEn}</p>
              </div>
              {imgSrc && (
                <img src={imgSrc} alt={nameKo} className="w-20 h-20 object-contain drop-shadow-md" />
              )}
            </div>
            <div className="flex flex-wrap gap-2 mb-4">
              {types.map(t => <Badge key={t} type={t} />)}
            </div>
            <div className="space-y-2">
              {['hp', 'attack', 'defense', 'speed'].map(k => (
                <StatBar key={k} statKey={k} value={pokemon[k]} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      const [query, setQuery]       = useState('');
      const [results, setResults]   = useState([]);
      const [loading, setLoading]   = useState(false);
      const [listLoading, setListLoading] = useState(true);
      const [error, setError]       = useState('');
      const [pokemonList, setPokemonList] = useState([]); // { name, url }[]
      const [searched, setSearched] = useState(false);

      // 앱 시작 시 전체 포켓몬 이름 목록 로드
      useEffect(() => {
        fetch(`${API_BASE}/pokemon?limit=2000`)
          .then(r => r.json())
          .then(data => setPokemonList(data.results))
          .catch(() => {}) // 실패해도 정확 검색은 가능
          .finally(() => setListLoading(false));
      }, []);

      const handleSearch = useCallback(async () => {
        const q = query.trim();
        if (!q) return;

        setLoading(true);
        setError('');
        setResults([]);
        setSearched(true);

        try {
          const lq = q.toLowerCase();

          // 한국어 부분 매칭 → 영어 이름으로 변환
          const koMatches = Object.entries(KO_TO_EN)
            .filter(([ko]) => ko.includes(q))
            .map(([, en]) => en);

          let candidates = [];

          if (pokemonList.length > 0) {
            // 전체 목록에서 부분 매칭
            candidates = pokemonList
              .filter(p => p.name.includes(lq) || koMatches.includes(p.name))
              .slice(0, 6)
              .map(p => p.name);
          }

          // 매칭 없으면 입력값을 그대로 사용 (정확 검색 시도)
          if (candidates.length === 0) {
            const en = KO_TO_EN[q] || lq;
            candidates = [en];
          }

          const details = await Promise.all(candidates.map(name => fetchPokemonDetail(name)));
          setResults(details);
        } catch (e) {
          setError(e.message || '검색 중 오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      }, [query, pokemonList]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') handleSearch();
      };

      return (
        <div className="max-w-5xl mx-auto px-4 py-10">
          {/* Title */}
          <div className="text-center mb-8">
            <h1 className="text-3xl sm:text-4xl font-extrabold text-gray-800 mb-1">포켓몬 도감</h1>
            <p className="text-gray-500 text-sm">
              {listLoading ? '포켓몬 목록 로딩 중...' : '이름(한국어/영어 부분 검색) 또는 번호로 검색'}
            </p>
          </div>

          {/* Search */}
          <div className="flex gap-2 max-w-lg mx-auto mb-10">
            <div className="relative flex-1">
              <input
                type="text"
                value={query}
                onChange={e => setQuery(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="예: 피카, char, 25"
                className="w-full px-5 py-3 pl-12 rounded-xl border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent text-gray-700 placeholder-gray-400"
                aria-label="포켓몬 검색"
              />
              <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"
                fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" strokeLinecap="round" />
              </svg>
            </div>
            <button
              onClick={handleSearch}
              disabled={loading || !query.trim()}
              className="px-5 py-3 bg-yellow-400 hover:bg-yellow-500 disabled:opacity-50 disabled:cursor-not-allowed text-yellow-900 font-bold rounded-xl shadow-sm transition-colors whitespace-nowrap"
            >
              검색
            </button>
          </div>

          {/* Loading */}
          {loading && (
            <div className="text-center py-20">
              <div className="inline-block w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mb-4"></div>
              <p className="text-gray-500">검색 중...</p>
            </div>
          )}

          {/* Error */}
          {!loading && error && (
            <div className="text-center py-20">
              <p className="text-5xl mb-4">😢</p>
              <p className="text-red-500 font-medium">{error}</p>
              <p className="text-gray-400 text-sm mt-1">다른 이름이나 번호로 검색해보세요</p>
            </div>
          )}

          {/* No results */}
          {!loading && !error && searched && results.length === 0 && (
            <div className="text-center py-20">
              <p className="text-5xl mb-4">🔍</p>
              <p className="text-gray-500 text-lg">검색 결과가 없습니다</p>
            </div>
          )}

          {/* Initial state */}
          {!loading && !searched && (
            <div className="text-center py-20">
              <p className="text-gray-300 text-7xl mb-4">🔎</p>
              <p className="text-gray-500 text-lg font-medium">포켓몬을 검색해보세요</p>
              <p className="text-gray-400 text-sm mt-1">"피카" 처럼 이름의 일부만 입력해도 됩니다</p>
            </div>
          )}

          {/* Results */}
          {!loading && results.length > 0 && (
            <>
              <p className="text-sm text-gray-400 mb-4">{results.length}개 검색됨</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {results.map((p, i) => (
                  <PokemonCard key={p.id} pokemon={p} index={i} />
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
