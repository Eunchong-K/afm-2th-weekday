<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 생성기 (밈 메이커)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; }
    #meme-canvas { cursor: default; }
    #meme-canvas.dragging { cursor: grabbing; }
    input[type="color"] { padding: 2px; border-radius: 4px; cursor: pointer; }
    input[type="range"] { accent-color: #6366f1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .tab-btn { transition: all 0.15s; }
    .layer-item { transition: background 0.15s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ onClick, children, variant = 'primary', size = 'md', disabled = false, className = '' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-all focus:outline-none disabled:opacity-40 disabled:cursor-not-allowed';
      const variants = {
        primary:   'bg-indigo-600 hover:bg-indigo-500 text-white',
        secondary: 'bg-slate-700 hover:bg-slate-600 text-slate-100',
        danger:    'bg-red-600 hover:bg-red-500 text-white',
        ghost:     'bg-transparent hover:bg-slate-700 text-slate-300',
        success:   'bg-emerald-600 hover:bg-emerald-500 text-white',
      };
      const sizes = { sm: 'px-2.5 py-1.5 text-xs gap-1', md: 'px-4 py-2 text-sm gap-2', lg: 'px-5 py-2.5 text-base gap-2' };
      return (
        <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Select({ label, value, onChange, options, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-xs font-medium text-slate-400 mb-1">{label}</label>}
          <select value={value} onChange={onChange}
            className="w-full bg-slate-700 border border-slate-600 text-slate-100 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      );
    }

    function ColorPicker({ label, value, onChange, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-xs font-medium text-slate-400 mb-1">{label}</label>}
          <div className="flex items-center gap-2">
            <input type="color" value={value} onChange={onChange} className="w-8 h-8 bg-slate-700 border border-slate-600 rounded cursor-pointer" />
            <span className="text-xs text-slate-400 font-mono">{value.toUpperCase()}</span>
          </div>
        </div>
      );
    }

    function RangeSlider({ label, value, onChange, min, max, step = 1, unit = '', className = '' }) {
      return (
        <div className={className}>
          {label && (
            <div className="flex justify-between items-center mb-1">
              <label className="text-xs font-medium text-slate-400">{label}</label>
              <span className="text-xs text-indigo-400 font-mono">{value}{unit}</span>
            </div>
          )}
          <input type="range" value={value} onChange={onChange} min={min} max={max} step={step}
            className="w-full h-1.5 rounded-full" />
        </div>
      );
    }

    function SectionLabel({ children }) {
      return <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">{children}</p>;
    }

    function TabBar({ tabs, active, onChange }) {
      return (
        <div className="flex bg-slate-900 rounded-lg p-1 gap-1 mb-3">
          {tabs.map(t => (
            <button key={t.value} onClick={() => onChange(t.value)}
              className={`tab-btn flex-1 py-1.5 text-xs font-medium rounded-md ${
                active === t.value ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'
              }`}>
              {t.label}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 🔧 Constants
    // ========================================

    const FONTS = [
      { value: 'Impact',              label: 'Impact (밈 클래식)' },
      { value: 'Arial Black',         label: 'Arial Black' },
      { value: '"Noto Sans KR"',      label: 'Noto Sans KR' },
      { value: 'Comic Sans MS',       label: 'Comic Sans MS' },
      { value: 'Georgia',             label: 'Georgia' },
      { value: 'Courier New',         label: 'Courier New' },
    ];

    const TEXT_ALIGN_OPTIONS = [
      { value: 'left',   label: '왼쪽' },
      { value: 'center', label: '가운데' },
      { value: 'right',  label: '오른쪽' },
    ];

    const GRAD_ANGLES = [
      { value: 0,   label: '→' },
      { value: 45,  label: '↗' },
      { value: 90,  label: '↑' },
      { value: 135, label: '↖' },
      { value: 180, label: '←' },
      { value: 225, label: '↙' },
      { value: 270, label: '↓' },
      { value: 315, label: '↘' },
    ];

    const PRESET_3D = [
      { value: 'grid',   label: '🔲 투시 격자' },
      { value: 'iso',    label: '◆ 아이소메트릭' },
      { value: 'orb',    label: '🔵 구체 광원' },
      { value: 'wave',   label: '〰️ 웨이브' },
      { value: 'dots',   label: '⚬ 도트 그리드' },
    ];

    // ========================================
    // 🔧 Helpers
    // ========================================

    function uid() { return Math.random().toString(36).slice(2, 9); }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, g, b };
    }

    // \n 줄내림 + 자동 줄바꿈 처리
    function getWrappedLines(ctx, text, maxWidth) {
      const lines = [];
      for (const para of text.split('\n')) {
        if (para === '') { lines.push(''); continue; }
        const words = para.split(' ');
        let line = '';
        for (let i = 0; i < words.length; i++) {
          const testLine = line + words[i] + ' ';
          if (ctx.measureText(testLine).width > maxWidth && i > 0) {
            lines.push(line.trim()); line = words[i] + ' ';
          } else { line = testLine; }
        }
        lines.push(line.trim());
      }
      return lines;
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      getWrappedLines(ctx, text, maxWidth).forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
    }
    function wrapTextStroke(ctx, text, x, y, maxWidth, lineHeight) {
      getWrappedLines(ctx, text, maxWidth).forEach((l, i) => ctx.strokeText(l, x, y + i * lineHeight));
    }

    // ========================================
    // 🎨 Background draw functions
    // ========================================

    function drawSolid(ctx, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, w, h);
    }

    function drawGradient(ctx, w, h, color1, color2, angle) {
      const rad = (angle * Math.PI) / 180;
      const cx = w / 2, cy = h / 2;
      const len = Math.sqrt(w * w + h * h) / 2;
      const x1 = cx - Math.cos(rad) * len, y1 = cy - Math.sin(rad) * len;
      const x2 = cx + Math.cos(rad) * len, y2 = cy + Math.sin(rad) * len;
      const grad = ctx.createLinearGradient(x1, y1, x2, y2);
      grad.addColorStop(0, color1);
      grad.addColorStop(1, color2);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function draw3D(ctx, w, h, style, color1, color2) {
      const c1 = hexToRgb(color1), c2 = hexToRgb(color2);
      ctx.fillStyle = color1;
      ctx.fillRect(0, 0, w, h);

      if (style === 'grid') {
        // Perspective floor grid
        const vx = w / 2, vy = h * 0.45;
        ctx.strokeStyle = `rgba(${c2.r},${c2.g},${c2.b},0.6)`;
        ctx.lineWidth = 1;
        // Vertical lines (converging)
        for (let i = -14; i <= 14; i++) {
          ctx.beginPath();
          ctx.moveTo(vx + i * 34, h);
          ctx.lineTo(vx, vy);
          ctx.stroke();
        }
        // Horizontal lines (perspective)
        for (let j = 0; j < 14; j++) {
          const t = j / 13;
          const ease = t * t;
          const y = vy + (h - vy) * ease;
          const spread = (vx * 2.8) * ease;
          ctx.beginPath();
          ctx.moveTo(vx - spread, y);
          ctx.lineTo(vx + spread, y);
          ctx.stroke();
        }
        // Glow horizon
        const horiz = ctx.createLinearGradient(0, vy - 40, 0, vy + 40);
        horiz.addColorStop(0, `rgba(${c2.r},${c2.g},${c2.b},0)`);
        horiz.addColorStop(0.5, `rgba(${c2.r},${c2.g},${c2.b},0.25)`);
        horiz.addColorStop(1, `rgba(${c2.r},${c2.g},${c2.b},0)`);
        ctx.fillStyle = horiz;
        ctx.fillRect(0, vy - 40, w, 80);
      }

      else if (style === 'iso') {
        // Isometric diamond grid
        const size = 48;
        ctx.strokeStyle = `rgba(${c2.r},${c2.g},${c2.b},0.5)`;
        ctx.lineWidth = 1;
        for (let row = -2; row < h / (size * 0.5) + 2; row++) {
          for (let col = -2; col < w / size + 2; col++) {
            const ox = col * size + (row % 2) * (size / 2);
            const oy = row * size * 0.5;
            ctx.beginPath();
            ctx.moveTo(ox + size / 2, oy);
            ctx.lineTo(ox + size, oy + size * 0.25);
            ctx.lineTo(ox + size / 2, oy + size * 0.5);
            ctx.lineTo(ox, oy + size * 0.25);
            ctx.closePath();
            ctx.stroke();
          }
        }
        // Top-face fill (alternating)
        for (let row = -2; row < h / (size * 0.5) + 2; row++) {
          for (let col = -2; col < w / size + 2; col++) {
            if ((row + col) % 3 === 0) {
              const ox = col * size + (row % 2) * (size / 2);
              const oy = row * size * 0.5;
              ctx.beginPath();
              ctx.moveTo(ox + size / 2, oy);
              ctx.lineTo(ox + size, oy + size * 0.25);
              ctx.lineTo(ox + size / 2, oy + size * 0.5);
              ctx.lineTo(ox, oy + size * 0.25);
              ctx.closePath();
              ctx.fillStyle = `rgba(${c2.r},${c2.g},${c2.b},0.15)`;
              ctx.fill();
            }
          }
        }
      }

      else if (style === 'orb') {
        // Radial gradient "3D orb" background
        const bg = ctx.createLinearGradient(0, 0, w, h);
        bg.addColorStop(0, color1);
        bg.addColorStop(1, `rgb(${Math.max(0,c1.r-40)},${Math.max(0,c1.g-40)},${Math.max(0,c1.b-40)})`);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);
        // Main orb
        const orbX = w * 0.5, orbY = h * 0.45, orbR = Math.min(w, h) * 0.32;
        const orb = ctx.createRadialGradient(orbX - orbR * 0.3, orbY - orbR * 0.3, orbR * 0.05, orbX, orbY, orbR);
        orb.addColorStop(0, `rgba(${c2.r},${c2.g},${c2.b},0.9)`);
        orb.addColorStop(0.5, `rgba(${c2.r},${c2.g},${c2.b},0.4)`);
        orb.addColorStop(1, `rgba(${c2.r},${c2.g},${c2.b},0)`);
        ctx.fillStyle = orb;
        ctx.beginPath();
        ctx.arc(orbX, orbY, orbR, 0, Math.PI * 2);
        ctx.fill();
        // Ambient glow
        const glow = ctx.createRadialGradient(w / 2, h, 0, w / 2, h, h * 0.6);
        glow.addColorStop(0, `rgba(${c2.r},${c2.g},${c2.b},0.2)`);
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, w, h);
        // Specular highlight
        const spec = ctx.createRadialGradient(orbX - orbR * 0.25, orbY - orbR * 0.3, 0, orbX - orbR * 0.1, orbY - orbR * 0.2, orbR * 0.35);
        spec.addColorStop(0, 'rgba(255,255,255,0.6)');
        spec.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = spec;
        ctx.beginPath();
        ctx.arc(orbX, orbY, orbR, 0, Math.PI * 2);
        ctx.fill();
      }

      else if (style === 'wave') {
        // Layered sine waves
        const layers = 7;
        for (let i = 0; i < layers; i++) {
          const t = i / (layers - 1);
          const alpha = 0.12 + t * 0.18;
          const amp = 30 + i * 8;
          const freq = 0.008 - i * 0.0005;
          const phase = i * 0.7;
          const yBase = h * (0.25 + t * 0.65);
          ctx.beginPath();
          ctx.moveTo(0, h);
          for (let x = 0; x <= w; x += 2) {
            const y = yBase + Math.sin(x * freq + phase) * amp + Math.sin(x * freq * 2.3 + phase * 1.5) * (amp * 0.4);
            ctx.lineTo(x, y);
          }
          ctx.lineTo(w, h);
          ctx.closePath();
          ctx.fillStyle = `rgba(${c2.r},${c2.g},${c2.b},${alpha})`;
          ctx.fill();
        }
      }

      else if (style === 'dots') {
        // Dot grid with depth (size increases toward center)
        const spacing = 28;
        for (let y = 0; y < h + spacing; y += spacing) {
          for (let x = 0; x < w + spacing; x += spacing) {
            const dx = x - w / 2, dy = y - h / 2;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = Math.sqrt((w / 2) ** 2 + (h / 2) ** 2);
            const t = 1 - dist / maxDist;
            const r = 1.5 + t * 4;
            const alpha = 0.15 + t * 0.45;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${c2.r},${c2.g},${c2.b},${alpha})`;
            ctx.fill();
          }
        }
      }
    }

    // ========================================
    // 📄 Main App Component
    // ========================================

    function App() {
      const canvasRef  = useRef(null);
      const fileInputRef = useRef(null);
      const [imageObj, setImageObj] = useState(null);
      const [canvasSize] = useState({ w: 600, h: 600 });

      // ── Background state ──
      const [bgTab, setBgTab] = useState('solid'); // 'solid' | 'gradient' | '3d'
      const [solidColor, setSolidColor] = useState('#1e293b');
      const [gradColor1, setGradColor1] = useState('#6366f1');
      const [gradColor2, setGradColor2] = useState('#a855f7');
      const [gradAngle, setGradAngle] = useState(135);
      const [d3Style, setD3Style] = useState('grid');
      const [d3Color1, setD3Color1] = useState('#0f172a');
      const [d3Color2, setD3Color2] = useState('#6366f1');

      // ── Text layers ──
      const [layers, setLayers] = useState([]);
      const [selectedId, setSelectedId] = useState(null);

      // ── New text form ──
      const [form, setForm] = useState({
        text: '', font: 'Impact', fontSize: 48,
        color: '#ffffff', strokeColor: '#000000', strokeWidth: 3,
        align: 'center', opacity: 100,
      });

      const dragRef = useRef({ active: false, id: null, startX: 0, startY: 0, origX: 0, origY: 0 });

      // ── Canvas draw ──
      const drawCanvas = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const { w, h } = canvasSize;
        ctx.clearRect(0, 0, w, h);

        if (imageObj) {
          const ir = imageObj.width / imageObj.height, cr = w / h;
          let sx, sy, sw, sh;
          if (ir > cr) { sh = imageObj.height; sw = sh * cr; sx = (imageObj.width - sw) / 2; sy = 0; }
          else         { sw = imageObj.width; sh = sw / cr; sx = 0; sy = (imageObj.height - sh) / 2; }
          ctx.drawImage(imageObj, sx, sy, sw, sh, 0, 0, w, h);
        } else if (bgTab === 'solid') {
          drawSolid(ctx, w, h, solidColor);
        } else if (bgTab === 'gradient') {
          drawGradient(ctx, w, h, gradColor1, gradColor2, gradAngle);
        } else if (bgTab === '3d') {
          draw3D(ctx, w, h, d3Style, d3Color1, d3Color2);
        } else {
          ctx.fillStyle = '#1e293b';
          ctx.fillRect(0, 0, w, h);
        }

        layers.forEach(layer => {
          ctx.globalAlpha = layer.opacity / 100;
          ctx.font = `bold ${layer.fontSize}px ${layer.font}`;
          ctx.textAlign = layer.align;
          ctx.lineJoin = 'round';
          const maxWidth = w - 40, lineHeight = layer.fontSize * 1.2;
          if (layer.strokeWidth > 0) {
            ctx.strokeStyle = layer.strokeColor;
            ctx.lineWidth = layer.strokeWidth * 2;
            wrapTextStroke(ctx, layer.text, layer.x, layer.y, maxWidth, lineHeight);
          }
          ctx.fillStyle = layer.color;
          wrapText(ctx, layer.text, layer.x, layer.y, maxWidth, lineHeight);

          if (layer.id === selectedId) {
            ctx.globalAlpha = 1;
            ctx.setLineDash([5, 3]);
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 2;
            const lines = getWrappedLines(ctx, layer.text, maxWidth);
            const longestW = lines.reduce((a, l) => Math.max(a, ctx.measureText(l).width), 0);
            const tw = Math.min(longestW, maxWidth) + 20;
            const th = lines.length * lineHeight + 10;
            let rx = layer.x - 10;
            if (layer.align === 'center') rx = layer.x - tw / 2;
            if (layer.align === 'right')  rx = layer.x - tw;
            ctx.strokeRect(rx, layer.y - layer.fontSize, tw, th);
            ctx.setLineDash([]);
          }
          ctx.globalAlpha = 1;
        });
      }, [imageObj, bgTab, solidColor, gradColor1, gradColor2, gradAngle, d3Style, d3Color1, d3Color2, layers, selectedId, canvasSize]);

      useEffect(() => { drawCanvas(); }, [drawCanvas]);

      // ── Image upload ──
      function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => setImageObj(img);
        img.src = url;
        e.target.value = '';
      }

      // ── Add text layer ──
      function handleAddText() {
        if (!form.text.trim()) return;
        const newLayer = {
          id: uid(), text: form.text, font: form.font,
          fontSize: Number(form.fontSize), color: form.color,
          strokeColor: form.strokeColor, strokeWidth: Number(form.strokeWidth),
          align: form.align, opacity: Number(form.opacity),
          x: canvasSize.w / 2, y: canvasSize.h - 60,
        };
        setLayers(prev => [...prev, newLayer]);
        setSelectedId(newLayer.id);
        setForm(f => ({ ...f, text: '' }));
      }

      function updateLayer(id, patch) {
        setLayers(prev => prev.map(l => l.id === id ? { ...l, ...patch } : l));
      }
      function deleteLayer(id) {
        setLayers(prev => prev.filter(l => l.id !== id));
        if (selectedId === id) setSelectedId(null);
      }
      function moveLayer(id, dir) {
        setLayers(prev => {
          const idx = prev.findIndex(l => l.id === id);
          const next = idx + dir;
          if (next < 0 || next >= prev.length) return prev;
          const arr = [...prev];
          [arr[idx], arr[next]] = [arr[next], arr[idx]];
          return arr;
        });
      }

      // ── Canvas mouse events ──
      function getCanvasPos(e) {
        const rect = canvasRef.current.getBoundingClientRect();
        const scaleX = canvasSize.w / rect.width, scaleY = canvasSize.h / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
      }

      function hitTest(pos) {
        for (let i = layers.length - 1; i >= 0; i--) {
          const l = layers[i];
          const ctx = canvasRef.current.getContext('2d');
          ctx.font = `bold ${l.fontSize}px ${l.font}`;
          const maxWidth = canvasSize.w - 40, lineHeight = l.fontSize * 1.2;
          const lines = getWrappedLines(ctx, l.text, maxWidth);
          const longestW = lines.reduce((a, ln) => Math.max(a, ctx.measureText(ln).width), 0);
          const tw = Math.min(longestW, maxWidth) + 20, th = lines.length * lineHeight + 10;
          let rx = l.x - 10;
          if (l.align === 'center') rx = l.x - tw / 2;
          if (l.align === 'right')  rx = l.x - tw;
          if (pos.x >= rx && pos.x <= rx + tw && pos.y >= l.y - l.fontSize && pos.y <= l.y - l.fontSize + th) return l.id;
        }
        return null;
      }

      function onMouseDown(e) {
        e.preventDefault();
        const pos = getCanvasPos(e);
        const hit = hitTest(pos);
        if (hit) {
          const layer = layers.find(l => l.id === hit);
          dragRef.current = { active: true, id: hit, startX: pos.x, startY: pos.y, origX: layer.x, origY: layer.y };
          setSelectedId(hit);
          canvasRef.current.classList.add('dragging');
        } else {
          setSelectedId(null);
        }
      }
      function onMouseMove(e) {
        if (!dragRef.current.active) return;
        e.preventDefault();
        const pos = getCanvasPos(e);
        updateLayer(dragRef.current.id, {
          x: dragRef.current.origX + (pos.x - dragRef.current.startX),
          y: dragRef.current.origY + (pos.y - dragRef.current.startY),
        });
      }
      function onMouseUp() {
        dragRef.current.active = false;
        canvasRef.current && canvasRef.current.classList.remove('dragging');
      }

      // ── Download ──
      function handleDownload() {
        const tmp = selectedId;
        setSelectedId(null);
        setTimeout(() => {
          const link = document.createElement('a');
          link.download = `meme_${Date.now()}.png`;
          link.href = canvasRef.current.toDataURL('image/png');
          link.click();
          setSelectedId(tmp);
        }, 80);
      }

      const selectedLayer = layers.find(l => l.id === selectedId);

      // ========================================
      // 🖥️ Render
      // ========================================
      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col">

          {/* Header */}
          <header className="bg-slate-800 border-b border-slate-700 px-6 py-3 flex items-center justify-between shrink-0">
            <div className="flex items-center gap-3">
              <span className="text-2xl">😂</span>
              <div>
                <h1 className="text-lg font-bold text-white leading-none">짤 생성기</h1>
                <p className="text-xs text-slate-400">밈 메이커 · Meme Maker</p>
              </div>
            </div>
            <Button variant="success" onClick={handleDownload}>
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
              </svg>
              PNG 다운로드
            </Button>
          </header>

          <div className="flex flex-1 overflow-hidden">

            {/* ── Left Panel ── */}
            <aside className="w-72 bg-slate-800 border-r border-slate-700 flex flex-col overflow-y-auto shrink-0">

              {/* 배경 섹션 */}
              <div className="p-4 border-b border-slate-700">
                <SectionLabel>배경 설정</SectionLabel>

                {/* 이미지 업로드 */}
                <input ref={fileInputRef} type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                <Button variant="secondary" className="w-full mb-3" onClick={() => fileInputRef.current.click()}>
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                  {imageObj ? '이미지 변경' : '이미지 업로드'}
                </Button>
                {imageObj && (
                  <Button variant="ghost" size="sm" className="w-full mb-3" onClick={() => setImageObj(null)}>
                    이미지 제거 (배경색 사용)
                  </Button>
                )}

                {/* 배경 타입 탭 */}
                {!imageObj && (
                  <>
                    <TabBar
                      tabs={[{ value: 'solid', label: '단색' }, { value: 'gradient', label: '그라데이션' }, { value: '3d', label: '3D' }]}
                      active={bgTab}
                      onChange={setBgTab}
                    />

                    {/* 단색 */}
                    {bgTab === 'solid' && (
                      <div className="space-y-3">
                        <ColorPicker label="배경 색상" value={solidColor} onChange={e => setSolidColor(e.target.value)} />
                        {/* Quick palette */}
                        <div>
                          <p className="text-xs text-slate-400 mb-2">빠른 선택</p>
                          <div className="grid grid-cols-8 gap-1">
                            {['#000000','#ffffff','#1e293b','#0f172a','#ef4444','#f97316','#eab308',
                              '#22c55e','#06b6d4','#6366f1','#a855f7','#ec4899','#64748b','#6b7280',
                              '#374151','#1f2937'].map(c => (
                              <button key={c} onClick={() => setSolidColor(c)}
                                className={`w-6 h-6 rounded border-2 transition-transform hover:scale-110 ${solidColor === c ? 'border-white' : 'border-transparent'}`}
                                style={{ background: c }} />
                            ))}
                          </div>
                        </div>
                      </div>
                    )}

                    {/* 그라데이션 */}
                    {bgTab === 'gradient' && (
                      <div className="space-y-3">
                        <div className="grid grid-cols-2 gap-3">
                          <ColorPicker label="색상 1" value={gradColor1} onChange={e => setGradColor1(e.target.value)} />
                          <ColorPicker label="색상 2" value={gradColor2} onChange={e => setGradColor2(e.target.value)} />
                        </div>
                        {/* Quick palette pairs */}
                        <div>
                          <p className="text-xs text-slate-400 mb-2">프리셋 조합</p>
                          <div className="grid grid-cols-4 gap-1.5">
                            {[
                              ['#6366f1','#a855f7'],['#ec4899','#f97316'],['#06b6d4','#6366f1'],
                              ['#22c55e','#06b6d4'],['#f59e0b','#ef4444'],['#a855f7','#ec4899'],
                              ['#0f172a','#6366f1'],['#000000','#1e293b'],
                            ].map(([c1, c2]) => (
                              <button key={c1+c2}
                                onClick={() => { setGradColor1(c1); setGradColor2(c2); }}
                                className="h-8 rounded-lg border-2 border-transparent hover:border-white transition-all"
                                style={{ background: `linear-gradient(135deg, ${c1}, ${c2})` }} />
                            ))}
                          </div>
                        </div>
                        {/* Direction */}
                        <div>
                          <p className="text-xs text-slate-400 mb-2">방향</p>
                          <div className="grid grid-cols-8 gap-1">
                            {GRAD_ANGLES.map(a => (
                              <button key={a.value} onClick={() => setGradAngle(a.value)}
                                className={`h-7 text-sm rounded transition-all ${gradAngle === a.value ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                                {a.label}
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}

                    {/* 3D */}
                    {bgTab === '3d' && (
                      <div className="space-y-3">
                        <div className="grid grid-cols-2 gap-3">
                          <ColorPicker label="배경 색" value={d3Color1} onChange={e => setD3Color1(e.target.value)} />
                          <ColorPicker label="포인트 색" value={d3Color2} onChange={e => setD3Color2(e.target.value)} />
                        </div>
                        <div>
                          <p className="text-xs text-slate-400 mb-2">스타일</p>
                          <div className="space-y-1">
                            {PRESET_3D.map(p => (
                              <button key={p.value} onClick={() => setD3Style(p.value)}
                                className={`w-full text-left px-3 py-2 text-xs rounded-lg transition-all ${
                                  d3Style === p.value ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                }`}>
                                {p.label}
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>

              {/* 텍스트 추가 섹션 */}
              <div className="p-4 space-y-3">
                <SectionLabel>텍스트 추가</SectionLabel>

                <div>
                  <label className="block text-xs font-medium text-slate-400 mb-1">내용 (Enter = 줄내림)</label>
                  <textarea
                    value={form.text}
                    onChange={e => setForm(f => ({ ...f, text: e.target.value }))}
                    onKeyDown={e => { if (e.key === 'Enter' && e.ctrlKey) handleAddText(); }}
                    placeholder="텍스트를 입력하세요..."
                    rows={3}
                    className="w-full bg-slate-700 border border-slate-600 text-slate-100 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-500 resize-none"
                  />
                </div>

                <Select label="폰트" value={form.font} onChange={e => setForm(f => ({ ...f, font: e.target.value }))} options={FONTS} />
                <Select label="정렬" value={form.align} onChange={e => setForm(f => ({ ...f, align: e.target.value }))} options={TEXT_ALIGN_OPTIONS} />
                <RangeSlider label="크기" value={form.fontSize} onChange={e => setForm(f => ({ ...f, fontSize: e.target.value }))} min={10} max={120} unit="px" />

                <div className="grid grid-cols-2 gap-3">
                  <ColorPicker label="글자 색" value={form.color} onChange={e => setForm(f => ({ ...f, color: e.target.value }))} />
                  <ColorPicker label="외곽선 색" value={form.strokeColor} onChange={e => setForm(f => ({ ...f, strokeColor: e.target.value }))} />
                </div>
                <RangeSlider label="외곽선 두께" value={form.strokeWidth} onChange={e => setForm(f => ({ ...f, strokeWidth: e.target.value }))} min={0} max={10} unit="px" />
                <RangeSlider label="투명도" value={form.opacity} onChange={e => setForm(f => ({ ...f, opacity: e.target.value }))} min={10} max={100} unit="%" />

                <Button variant="primary" className="w-full" onClick={handleAddText} disabled={!form.text.trim()}>
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                  </svg>
                  텍스트 추가 (Ctrl+Enter)
                </Button>
              </div>
            </aside>

            {/* ── Center: Canvas ── */}
            <main className="flex-1 flex items-center justify-center bg-slate-950 p-6 overflow-auto">
              <div className="flex flex-col items-center gap-3">
                <div className="shadow-2xl shadow-black/60 rounded-xl overflow-hidden"
                  style={{ width: '100%', maxWidth: canvasSize.w }}>
                  <canvas
                    id="meme-canvas"
                    ref={canvasRef}
                    width={canvasSize.w}
                    height={canvasSize.h}
                    style={{ display: 'block', width: '100%', height: 'auto', touchAction: 'none' }}
                    onMouseDown={onMouseDown}
                    onMouseMove={onMouseMove}
                    onMouseUp={onMouseUp}
                    onMouseLeave={onMouseUp}
                    onTouchStart={onMouseDown}
                    onTouchMove={onMouseMove}
                    onTouchEnd={onMouseUp}
                  />
                </div>
                <p className="text-xs text-slate-500">텍스트를 클릭·드래그해서 이동 | 레이어 목록에서 선택 후 편집</p>
              </div>
            </main>

            {/* ── Right Panel: Layer list + inline edit ── */}
            <aside className="w-80 bg-slate-800 border-l border-slate-700 flex flex-col shrink-0 overflow-hidden">
              <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                <div>
                  <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest">텍스트 레이어</p>
                  <p className="text-xs text-slate-500 mt-0.5">{layers.length}개 · 클릭하여 편집</p>
                </div>
                {layers.length > 0 && (
                  <Button variant="danger" size="sm" onClick={() => { setLayers([]); setSelectedId(null); }}>전체 삭제</Button>
                )}
              </div>

              <div className="flex-1 overflow-y-auto p-2 space-y-1">
                {layers.length === 0 && (
                  <div className="text-center py-12 text-slate-500 text-xs">
                    <div className="text-4xl mb-2">📝</div>
                    왼쪽에서 텍스트를 추가하세요
                  </div>
                )}

                {[...layers].reverse().map((layer) => {
                  const realIdx = layers.findIndex(l => l.id === layer.id);
                  const isSelected = selectedId === layer.id;
                  return (
                    <div key={layer.id}
                      className={`layer-item rounded-xl border overflow-hidden ${
                        isSelected ? 'border-indigo-500 bg-indigo-900/20' : 'border-slate-700 bg-slate-700/40 hover:bg-slate-700/70'
                      }`}>

                      {/* Layer header row */}
                      <div className="flex items-center gap-2 px-3 py-2 cursor-pointer"
                        onClick={() => setSelectedId(isSelected ? null : layer.id)}>
                        <div className="flex-1 min-w-0">
                          <p className="text-xs font-medium text-slate-200 truncate">{layer.text || '(빈 텍스트)'}</p>
                          <p className="text-xs text-slate-500 truncate">{layer.font.replace(/"/g,'')} · {layer.fontSize}px</p>
                        </div>
                        {/* Color preview */}
                        <div className="w-4 h-4 rounded-full border border-slate-600 shrink-0"
                          style={{ background: layer.color }} />
                        {/* Expand chevron */}
                        <svg className={`w-3 h-3 text-slate-400 shrink-0 transition-transform ${isSelected ? 'rotate-180' : ''}`}
                          fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                        </svg>
                      </div>

                      {/* Inline order/delete buttons always visible */}
                      <div className="flex items-center gap-1 px-3 pb-2">
                        <button onClick={e => { e.stopPropagation(); moveLayer(layer.id, 1); }}
                          disabled={realIdx === 0}
                          title="앞으로" className="p-1 text-slate-400 hover:text-white disabled:opacity-30 rounded">
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7" />
                          </svg>
                        </button>
                        <button onClick={e => { e.stopPropagation(); moveLayer(layer.id, -1); }}
                          disabled={realIdx === layers.length - 1}
                          title="뒤로" className="p-1 text-slate-400 hover:text-white disabled:opacity-30 rounded">
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                          </svg>
                        </button>
                        <span className="text-xs text-slate-600 ml-1">순서</span>
                        <button onClick={e => { e.stopPropagation(); deleteLayer(layer.id); }}
                          title="삭제" className="p-1 text-red-400 hover:text-red-300 rounded ml-auto">
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                          </svg>
                        </button>
                      </div>

                      {/* ── 편집 패널 (선택시 확장) ── */}
                      {isSelected && (
                        <div className="border-t border-indigo-700/40 px-3 py-3 space-y-3 bg-slate-900/40">
                          <div>
                            <label className="block text-xs font-medium text-slate-400 mb-1">텍스트</label>
                            <textarea value={layer.text}
                              onChange={e => updateLayer(layer.id, { text: e.target.value })}
                              rows={2}
                              className="w-full bg-slate-700 border border-indigo-600/60 text-slate-100 text-xs rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-500 resize-none" />
                          </div>

                          <div className="grid grid-cols-2 gap-2">
                            <Select label="폰트" value={layer.font} onChange={e => updateLayer(layer.id, { font: e.target.value })} options={FONTS} />
                            <Select label="정렬" value={layer.align} onChange={e => updateLayer(layer.id, { align: e.target.value })} options={TEXT_ALIGN_OPTIONS} />
                          </div>

                          <RangeSlider label="크기" value={layer.fontSize}
                            onChange={e => updateLayer(layer.id, { fontSize: Number(e.target.value) })} min={10} max={120} unit="px" />

                          <div className="grid grid-cols-2 gap-2">
                            <ColorPicker label="글자 색" value={layer.color} onChange={e => updateLayer(layer.id, { color: e.target.value })} />
                            <ColorPicker label="외곽선 색" value={layer.strokeColor} onChange={e => updateLayer(layer.id, { strokeColor: e.target.value })} />
                          </div>

                          <RangeSlider label="외곽선" value={layer.strokeWidth}
                            onChange={e => updateLayer(layer.id, { strokeWidth: Number(e.target.value) })} min={0} max={10} unit="px" />
                          <RangeSlider label="투명도" value={layer.opacity}
                            onChange={e => updateLayer(layer.id, { opacity: Number(e.target.value) })} min={10} max={100} unit="%" />
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </aside>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
