<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국 나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-lg border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    function StatCard({ label, value, unit, icon, color = 'indigo' }) {
      const colorMap = {
        indigo: 'from-indigo-500 to-indigo-600 text-indigo-600 bg-indigo-50',
        emerald: 'from-emerald-500 to-emerald-600 text-emerald-600 bg-emerald-50',
        amber: 'from-amber-500 to-amber-600 text-amber-600 bg-amber-50',
        rose: 'from-rose-500 to-rose-600 text-rose-600 bg-rose-50',
      };
      const colors = colorMap[color] || colorMap.indigo;
      const [gradient, textColor, bgColor] = colors.split(' ');

      return (
        <div className="bg-white rounded-xl shadow-md border border-gray-100 p-5 hover:shadow-lg transition-shadow duration-200">
          <div className="flex items-center gap-3 mb-3">
            <span className={`text-2xl w-10 h-10 flex items-center justify-center rounded-lg ${bgColor}`}>
              {icon}
            </span>
            <span className="text-sm font-medium text-gray-500">{label}</span>
          </div>
          <div className="flex items-baseline gap-1.5">
            <span className={`text-3xl font-bold ${textColor}`}>
              {value !== null ? value.toLocaleString() : '-'}
            </span>
            <span className="text-base font-medium text-gray-400">{unit}</span>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧮 Age Calculation Logic
    // ========================================

    function calculateAgeInfo(birthDate) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const birth = new Date(birthDate);
      birth.setHours(0, 0, 0, 0);

      if (birth > today) return null;

      const todayYear = today.getFullYear();
      const birthYear = birth.getFullYear();
      const monthDiff = today.getMonth() - birth.getMonth();
      const dayDiff = today.getDate() - birth.getDate();
      const birthdayPassedThisYear = monthDiff > 0 || (monthDiff === 0 && dayDiff >= 0);

      // 만 나이 (법적 기준, 2023.6.28 시행)
      const manAge = birthdayPassedThisYear
        ? todayYear - birthYear
        : todayYear - birthYear - 1;

      // 세는 나이 (한국 전통식: 태어나면 1살, 매년 1월 1일 +1)
      const seNunAge = todayYear - birthYear + 1;

      // 연 나이 (현재 연도 - 출생 연도, 청소년보호법 등 일부 법령)
      const yeonAge = todayYear - birthYear;

      // 태어난 지 며칠
      const diffTime = today.getTime() - birth.getTime();
      const daysSinceBirth = Math.floor(diffTime / (1000 * 60 * 60 * 24));

      // 다음 생일까지 남은 날
      const isBirthdayToday = monthDiff === 0 && dayDiff === 0;
      let nextBirthday = new Date(todayYear, birth.getMonth(), birth.getDate());
      nextBirthday.setHours(0, 0, 0, 0);
      if (nextBirthday <= today) {
        nextBirthday = new Date(todayYear + 1, birth.getMonth(), birth.getDate());
        nextBirthday.setHours(0, 0, 0, 0);
      }
      const daysUntilBirthday = Math.ceil((nextBirthday.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));

      return {
        manAge,
        seNunAge,
        yeonAge,
        daysSinceBirth,
        daysUntilBirthday: isBirthdayToday ? 0 : daysUntilBirthday,
        isBirthdayToday,
      };
    }

    // ========================================
    // 📄 App Component
    // ========================================

    function App() {
      const [birthDate, setBirthDate] = useState('');

      const result = useMemo(() => {
        if (!birthDate) return null;
        return calculateAgeInfo(birthDate);
      }, [birthDate]);

      const todayStr = new Date().toISOString().split('T')[0];

      return (
        <div className="min-h-screen flex items-center justify-center px-4 py-10">
          <div className="w-full max-w-lg">
            {/* Header */}
            <div className="text-center mb-8">
              <h1 className="text-3xl sm:text-4xl font-bold text-gray-800 mb-2">
                한국 나이 계산기
              </h1>
              <p className="text-gray-500 text-sm">
                만 나이 · 세는 나이 · 연 나이를 한번에 확인하세요
              </p>
            </div>

            {/* Input Card */}
            <Card className="p-6 mb-6">
              <label
                htmlFor="birthdate"
                className="block text-sm font-semibold text-gray-700 mb-2"
              >
                생년월일
              </label>
              <input
                id="birthdate"
                type="date"
                value={birthDate}
                max={todayStr}
                onChange={(e) => setBirthDate(e.target.value)}
                className="w-full px-4 py-3 text-lg border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all duration-200 text-gray-700"
                aria-label="생년월일 선택"
              />
            </Card>

            {/* Results */}
            {result && (
              <div className="fade-in space-y-4">
                {/* Birthday message */}
                {result.isBirthdayToday && (
                  <div className="bg-gradient-to-r from-pink-500 to-rose-500 text-white rounded-xl p-4 text-center shadow-lg">
                    <p className="text-xl font-bold">생일 축하합니다! 🎉</p>
                    <p className="text-sm opacity-90 mt-1">오늘은 당신의 특별한 날입니다</p>
                  </div>
                )}

                {/* 3가지 나이 비교 카드 */}
                <div className="grid grid-cols-1 gap-3">
                  {/* 만 나이 - 메인 강조 */}
                  <div className="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-6 shadow-lg">
                    <div className="flex items-start justify-between">
                      <div>
                        <p className="text-indigo-100 text-xs font-semibold uppercase tracking-wider mb-1">만 나이</p>
                        <p className="text-white text-5xl font-extrabold leading-none">
                          {result.manAge}<span className="text-xl font-semibold text-indigo-200 ml-1">세</span>
                        </p>
                      </div>
                      <span className="bg-white/20 text-white text-xs font-medium px-2.5 py-1 rounded-full">법적 기준</span>
                    </div>
                    <p className="text-indigo-200 text-xs mt-3 leading-relaxed">
                      2023년 6월 28일부터 민법 개정으로 공식 법적 나이 기준.<br/>
                      생일이 지났으면 올해 나이, 안 지났으면 작년 나이.
                    </p>
                  </div>

                  {/* 세는 나이 & 연 나이 */}
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                      <div className="flex items-center justify-between mb-2">
                        <p className="text-xs font-semibold text-gray-400">세는 나이</p>
                        <span className="bg-amber-100 text-amber-700 text-xs font-medium px-2 py-0.5 rounded-full">전통식</span>
                      </div>
                      <p className="text-4xl font-extrabold text-amber-500">
                        {result.seNunAge}<span className="text-base font-semibold text-gray-400 ml-1">세</span>
                      </p>
                      <p className="text-gray-400 text-xs mt-2 leading-relaxed">
                        태어나면 1살, 매년 1월 1일마다 한 살씩 추가. 일상 대화에서 여전히 사용.
                      </p>
                    </div>

                    <div className="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                      <div className="flex items-center justify-between mb-2">
                        <p className="text-xs font-semibold text-gray-400">연 나이</p>
                        <span className="bg-emerald-100 text-emerald-700 text-xs font-medium px-2 py-0.5 rounded-full">일부 법령</span>
                      </div>
                      <p className="text-4xl font-extrabold text-emerald-500">
                        {result.yeonAge}<span className="text-base font-semibold text-gray-400 ml-1">세</span>
                      </p>
                      <p className="text-gray-400 text-xs mt-2 leading-relaxed">
                        올해 연도 − 출생 연도. 청소년보호법·병역법 등 일부 법령에서 사용.
                      </p>
                    </div>
                  </div>
                </div>

                {/* 나이 차이 안내 */}
                <Card className="p-4 bg-gray-50 border-dashed">
                  <h3 className="text-xs font-semibold text-gray-400 mb-2.5 uppercase tracking-wider">나이 기준 비교</h3>
                  <div className="space-y-2 text-sm">
                    {[
                      { label: '만 나이', value: result.manAge, badge: '공식 법적 기준', color: 'text-indigo-600' },
                      { label: '연 나이', value: result.yeonAge, badge: '청소년보호법 등', color: 'text-emerald-600' },
                      { label: '세는 나이', value: result.seNunAge, badge: '전통 한국식', color: 'text-amber-600' },
                    ].map((item, i) => (
                      <div key={i} className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <span className="text-gray-500 w-20">{item.label}</span>
                          <span className="text-xs text-gray-400">{item.badge}</span>
                        </div>
                        <span className={`font-bold ${item.color}`}>{item.value}세</span>
                      </div>
                    ))}
                  </div>
                </Card>

                {/* 추가 정보 */}
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <StatCard
                    label="태어난 지"
                    value={result.daysSinceBirth}
                    unit="일"
                    icon="📅"
                    color="emerald"
                  />
                  <StatCard
                    label={result.isBirthdayToday ? "다음 생일까지" : "생일까지 남은 날"}
                    value={result.isBirthdayToday ? 365 : result.daysUntilBirthday}
                    unit="일"
                    icon="🎂"
                    color="amber"
                  />
                </div>

                <Card className="p-5">
                  <h3 className="text-sm font-semibold text-gray-500 mb-3">더 보기</h3>
                  <div className="space-y-2.5 text-sm">
                    <div className="flex justify-between items-center">
                      <span className="text-gray-500">태어난 주</span>
                      <span className="font-medium text-gray-700">약 {Math.floor(result.daysSinceBirth / 7).toLocaleString()}주</span>
                    </div>
                    <div className="h-px bg-gray-100"></div>
                    <div className="flex justify-between items-center">
                      <span className="text-gray-500">태어난 개월</span>
                      <span className="font-medium text-gray-700">약 {Math.floor(result.daysSinceBirth / 30.44).toLocaleString()}개월</span>
                    </div>
                    <div className="h-px bg-gray-100"></div>
                    <div className="flex justify-between items-center">
                      <span className="text-gray-500">다음 생일 만 나이</span>
                      <span className="font-medium text-gray-700">만 {result.manAge + 1}세</span>
                    </div>
                  </div>
                </Card>
              </div>
            )}

            {/* Empty state */}
            {!result && !birthDate && (
              <div className="text-center py-12 text-gray-400">
                <p className="text-5xl mb-4">🎂</p>
                <p className="text-sm">생년월일을 선택해 주세요</p>
              </div>
            )}

            {/* Footer */}
            <p className="text-center text-xs text-gray-400 mt-8">
              오늘 날짜 기준: {new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' })}
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
