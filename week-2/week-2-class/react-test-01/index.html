<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple-Style Headings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }

    .apple-h1 { font-size: clamp(36px, 5.5vw, 80px);  font-weight: 700; line-height: 1.05; letter-spacing: -0.015em; }
    .apple-h2 { font-size: clamp(30px, 4.5vw, 64px);  font-weight: 700; line-height: 1.08; letter-spacing: -0.01em; }
    .apple-h3 { font-size: clamp(24px, 3.5vw, 48px);  font-weight: 600; line-height: 1.1;  letter-spacing: -0.008em; }
    .apple-h4 { font-size: clamp(20px, 2.8vw, 38px);  font-weight: 600; line-height: 1.15; letter-spacing: -0.005em; }
    .apple-h5 { font-size: clamp(16px, 2vw,  26px);   font-weight: 500; line-height: 1.2;  letter-spacing: -0.003em; }
    .apple-h6 { font-size: clamp(13px, 1.3vw, 18px);  font-weight: 500; line-height: 1.3;  letter-spacing: 0; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }
    .float { animation: float 4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const FONT = "-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif";

    // ─── SVG Illustrations ───────────────────────────────────

    function IPhoneSVG() {
      return (
        <svg viewBox="0 0 200 400" width="160" height="320" style={{ filter: "drop-shadow(0 40px 60px rgba(0,0,0,0.18))" }}>
          {/* body */}
          <rect x="10" y="10" width="180" height="380" rx="36" fill="url(#iphoneGrad)" />
          {/* screen */}
          <rect x="18" y="18" width="164" height="364" rx="30" fill="#111" />
          {/* Dynamic Island */}
          <rect x="72" y="30" width="56" height="16" rx="8" fill="#000" />
          {/* screen glow */}
          <rect x="22" y="60" width="156" height="260" rx="4" fill="url(#screenGrad)" opacity="0.9" />
          {/* camera bump */}
          <rect x="24" y="24" width="52" height="52" rx="14" fill="url(#cameraGrad)" opacity="0.6"/>
          <circle cx="44" cy="40" r="9" fill="#1a1a1a" stroke="#333" strokeWidth="2"/>
          <circle cx="62" cy="40" r="9" fill="#1a1a1a" stroke="#333" strokeWidth="2"/>
          <circle cx="44" cy="58" r="9" fill="#1a1a1a" stroke="#333" strokeWidth="2"/>
          <defs>
            <linearGradient id="iphoneGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#e8e3da"/>
              <stop offset="100%" stopColor="#bfb8ad"/>
            </linearGradient>
            <linearGradient id="screenGrad" x1="0" y1="0" x2="0.5" y2="1">
              <stop offset="0%" stopColor="#4facfe"/>
              <stop offset="50%" stopColor="#a855f7"/>
              <stop offset="100%" stopColor="#f472b6"/>
            </linearGradient>
            <linearGradient id="cameraGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#555"/>
              <stop offset="100%" stopColor="#222"/>
            </linearGradient>
          </defs>
        </svg>
      );
    }

    function MacBookSVG() {
      return (
        <svg viewBox="0 0 420 270" width="340" height="220" style={{ filter: "drop-shadow(0 30px 50px rgba(0,0,0,0.15))" }}>
          {/* lid */}
          <rect x="20" y="8" width="380" height="230" rx="14" fill="url(#mbGrad)" />
          <rect x="28" y="16" width="364" height="214" rx="10" fill="#0a0a0a" />
          {/* screen content */}
          <rect x="32" y="20" width="356" height="206" rx="8" fill="url(#mbScreen)" opacity="0.95"/>
          {/* menu bar */}
          <rect x="32" y="20" width="356" height="22" rx="0" fill="rgba(255,255,255,0.08)"/>
          {/* Apple logo on lid */}
          <circle cx="210" cy="4" r="5" fill="#c8c3bb" opacity="0.6"/>
          {/* base */}
          <path d="M0 246 Q210 238 420 246 L400 258 Q210 262 20 258 Z" fill="url(#mbBase)" />
          {/* hinge */}
          <rect x="10" y="242" width="400" height="6" rx="3" fill="#bbb"/>
          <defs>
            <linearGradient id="mbGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#d4d0c8"/>
              <stop offset="100%" stopColor="#b8b4ac"/>
            </linearGradient>
            <linearGradient id="mbBase" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#c8c4bc"/>
              <stop offset="100%" stopColor="#a8a49c"/>
            </linearGradient>
            <linearGradient id="mbScreen" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#0f2027"/>
              <stop offset="50%" stopColor="#203a43"/>
              <stop offset="100%" stopColor="#2c5364"/>
            </linearGradient>
          </defs>
        </svg>
      );
    }

    function WatchSVG() {
      return (
        <svg viewBox="0 0 200 260" width="160" height="210" style={{ filter: "drop-shadow(0 30px 50px rgba(255,255,255,0.08))" }}>
          {/* band top */}
          <rect x="68" y="0" width="64" height="60" rx="12" fill="#2a2a2a"/>
          {/* band bottom */}
          <rect x="68" y="200" width="64" height="60" rx="12" fill="#2a2a2a"/>
          {/* case */}
          <rect x="18" y="52" width="164" height="156" rx="38" fill="url(#watchGrad)" />
          {/* screen */}
          <rect x="26" y="60" width="148" height="140" rx="32" fill="#0a0a0a"/>
          {/* screen content */}
          <rect x="30" y="64" width="140" height="132" rx="28" fill="url(#watchScreen)"/>
          {/* time text placeholder */}
          <rect x="54" y="100" width="92" height="28" rx="6" fill="rgba(255,255,255,0.9)"/>
          <rect x="68" y="138" width="64" height="14" rx="4" fill="rgba(255,255,255,0.4)"/>
          {/* crown */}
          <rect x="182" y="96" width="10" height="30" rx="5" fill="#c0bdb8"/>
          <defs>
            <linearGradient id="watchGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#2c2c2e"/>
              <stop offset="100%" stopColor="#1c1c1e"/>
            </linearGradient>
            <linearGradient id="watchScreen" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#1a1a2e"/>
              <stop offset="100%" stopColor="#16213e"/>
            </linearGradient>
          </defs>
        </svg>
      );
    }

    function IPadSVG() {
      return (
        <svg viewBox="0 0 300 420" width="200" height="280" style={{ filter: "drop-shadow(0 40px 60px rgba(255,255,255,0.06))" }}>
          {/* body */}
          <rect x="8" y="8" width="284" height="404" rx="22" fill="url(#ipadGrad)" />
          {/* screen */}
          <rect x="16" y="16" width="268" height="388" rx="16" fill="#050505"/>
          {/* screen content */}
          <rect x="20" y="20" width="260" height="380" rx="12" fill="url(#ipadScreen)"/>
          {/* front camera */}
          <circle cx="152" cy="210" r="4" fill="#111" opacity="0.8"/>
          {/* Apple Pencil */}
          <rect x="296" y="40" width="8" height="340" rx="4" fill="url(#pencilGrad)"/>
          <rect x="296" y="40" width="8" height="16" rx="4" fill="#e8e3da"/>
          <defs>
            <linearGradient id="ipadGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#2c2c2e"/>
              <stop offset="100%" stopColor="#1c1c1e"/>
            </linearGradient>
            <linearGradient id="ipadScreen" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#0f0c29"/>
              <stop offset="100%" stopColor="#302b63"/>
            </linearGradient>
            <linearGradient id="pencilGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="#e0ddd8"/>
              <stop offset="100%" stopColor="#c8c4be"/>
            </linearGradient>
          </defs>
        </svg>
      );
    }

    function AirPodsSVG() {
      return (
        <svg viewBox="0 0 280 200" width="280" height="200" style={{ filter: "drop-shadow(0 20px 40px rgba(0,0,0,0.12))" }}>
          {/* case */}
          <rect x="90" y="60" width="100" height="120" rx="28" fill="url(#caseGrad)"/>
          <rect x="96" y="66" width="88" height="108" rx="24" fill="#f0eeea"/>
          {/* lid line */}
          <line x1="90" y1="100" x2="190" y2="100" stroke="#d0cdc8" strokeWidth="1.5"/>
          {/* left pod */}
          <ellipse cx="52" cy="80" rx="22" ry="28" fill="url(#podGrad)"/>
          <rect x="44" y="105" width="16" height="44" rx="8" fill="url(#podGrad)"/>
          <ellipse cx="52" cy="80" rx="14" ry="18" fill="#e8e6e1"/>
          {/* right pod */}
          <ellipse cx="228" cy="80" rx="22" ry="28" fill="url(#podGrad)"/>
          <rect x="220" y="105" width="16" height="44" rx="8" fill="url(#podGrad)"/>
          <ellipse cx="228" cy="80" rx="14" ry="18" fill="#e8e6e1"/>
          {/* charging light */}
          <circle cx="140" cy="164" r="4" fill="#30d158" opacity="0.9"/>
          <defs>
            <linearGradient id="caseGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#e8e4de"/>
              <stop offset="100%" stopColor="#d0ccc6"/>
            </linearGradient>
            <linearGradient id="podGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#f0eeea"/>
              <stop offset="100%" stopColor="#d8d4ce"/>
            </linearGradient>
          </defs>
        </svg>
      );
    }

    function VisionProSVG() {
      return (
        <svg viewBox="0 0 360 220" width="320" height="200" style={{ filter: "drop-shadow(0 30px 60px rgba(0,0,0,0.15))" }}>
          {/* main body */}
          <path d="M30 80 Q30 30 100 30 L260 30 Q330 30 330 80 L330 140 Q330 190 260 190 L100 190 Q30 190 30 140 Z" fill="url(#vpGrad)"/>
          {/* visor glass */}
          <path d="M46 84 Q46 46 108 46 L252 46 Q314 46 314 84 L314 136 Q314 174 252 174 L108 174 Q46 174 46 136 Z" fill="url(#vpGlass)" opacity="0.9"/>
          {/* left lens */}
          <ellipse cx="128" cy="110" rx="52" ry="46" fill="url(#lensGrad)" opacity="0.8"/>
          <ellipse cx="128" cy="110" rx="44" ry="38" fill="url(#lensInner)"/>
          {/* right lens */}
          <ellipse cx="232" cy="110" rx="52" ry="46" fill="url(#lensGrad)" opacity="0.8"/>
          <ellipse cx="232" cy="110" rx="44" ry="38" fill="url(#lensInner)"/>
          {/* bridge */}
          <path d="M176 96 Q180 88 184 96" stroke="#5a5a5e" strokeWidth="3" fill="none"/>
          {/* light seal */}
          <path d="M46 84 Q30 110 46 136" stroke="rgba(255,255,255,0.15)" strokeWidth="2" fill="none"/>
          <path d="M314 84 Q330 110 314 136" stroke="rgba(255,255,255,0.15)" strokeWidth="2" fill="none"/>
          {/* band attachment */}
          <rect x="8" y="96" width="22" height="28" rx="6" fill="#c8c4be"/>
          <rect x="330" y="96" width="22" height="28" rx="6" fill="#c8c4be"/>
          {/* top strap */}
          <path d="M30 80 Q180 50 330 80" stroke="#b8b4ae" strokeWidth="10" fill="none" strokeLinecap="round"/>
          {/* Digital Crown */}
          <circle cx="180" cy="26" r="10" fill="url(#crownGrad)"/>
          <defs>
            <linearGradient id="vpGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#3a3a3c"/>
              <stop offset="100%" stopColor="#1c1c1e"/>
            </linearGradient>
            <linearGradient id="vpGlass" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#4facfe" stopOpacity="0.6"/>
              <stop offset="50%" stopColor="#6e40c9" stopOpacity="0.5"/>
              <stop offset="100%" stopColor="#f472b6" stopOpacity="0.4"/>
            </linearGradient>
            <radialGradient id="lensGrad">
              <stop offset="0%" stopColor="#5a5aff" stopOpacity="0.5"/>
              <stop offset="100%" stopColor="#2a2aaa" stopOpacity="0.3"/>
            </radialGradient>
            <radialGradient id="lensInner">
              <stop offset="0%" stopColor="#0a0a3a"/>
              <stop offset="100%" stopColor="#050518"/>
            </radialGradient>
            <linearGradient id="crownGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#d8d4ce"/>
              <stop offset="100%" stopColor="#b0aca6"/>
            </linearGradient>
          </defs>
        </svg>
      );
    }

    // ─── Data ────────────────────────────────────────────────

    const headings = [
      {
        tag: "H1", className: "apple-h1",
        bg: "#ffffff", textColor: "#1d1d1f", descColor: "#6e6e73",
        sub: "iPhone 16 Pro", text: "iPhone 16 Pro.", desc: "Built for Apple Intelligence.",
        Illustration: IPhoneSVG,
        layout: "right",
      },
      {
        tag: "H2", className: "apple-h2",
        bg: "#f5f5f7", textColor: "#1d1d1f", descColor: "#6e6e73",
        sub: "MacBook Air", text: "Designed for\neverything you do.", desc: "Supercharged by M3. Impossibly thin.",
        Illustration: MacBookSVG,
        layout: "bottom",
      },
      {
        tag: "H3", className: "apple-h3",
        bg: "#000000", textColor: "#ffffff", descColor: "#a1a1a6",
        sub: "Apple Watch Series 10", text: "Thinnest Apple Watch ever.", desc: "The most capable Apple Watch. Reimagined.",
        Illustration: WatchSVG,
        layout: "right",
      },
      {
        tag: "H4", className: "apple-h4",
        bg: "#1d1d1f", textColor: "#ffffff", descColor: "#a1a1a6",
        sub: "iPad Pro", text: "Unbelievably thin.\nUnbelievably powerful.", desc: "The ultimate iPad experience, taken further.",
        Illustration: IPadSVG,
        layout: "right",
      },
      {
        tag: "H5", className: "apple-h5",
        bg: "#f5f5f7", textColor: "#1d1d1f", descColor: "#6e6e73",
        sub: "AirPods Pro 2", text: "Adaptive Audio. Now lossless.\nNow finds your things.", desc: "Personalized Spatial Audio with dynamic head tracking.",
        Illustration: AirPodsSVG,
        layout: "bottom",
      },
      {
        tag: "H6", className: "apple-h6",
        bg: "#ffffff", textColor: "#1d1d1f", descColor: "#6e6e73",
        sub: "Apple Vision Pro", text: "Welcome to the era of spatial computing.", desc: "Apple Vision Pro seamlessly blends digital content with your physical space.",
        Illustration: VisionProSVG,
        layout: "bottom",
      },
    ];

    // ─── Slide ───────────────────────────────────────────────

    function Slide({ slide, visible, dir }) {
      const { tag, className, bg, textColor, descColor, sub, text, desc, Illustration, layout } = slide;
      const lines = text.split("\n");

      const containerStyle = {
        position: "absolute", inset: 0,
        background: bg,
        display: "flex",
        alignItems: "center", justifyContent: "center",
        fontFamily: FONT,
        opacity: visible ? 1 : 0,
        transform: visible ? "translateX(0)" : `translateX(${dir === "next" ? 60 : -60}px)`,
        transition: "opacity 0.5s ease, transform 0.5s ease",
        pointerEvents: visible ? "auto" : "none",
        padding: "60px clamp(24px, 6vw, 100px) 80px",
        gap: "clamp(24px, 4vw, 60px)",
        flexDirection: layout === "bottom" ? "column" : "row",
      };

      const textBlock = (
        <div style={{ flex: layout === "right" ? "1 1 0" : "unset", textAlign: layout === "bottom" ? "center" : "left" }}>
          <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.12em", textTransform: "uppercase", color: "#0071e3", display: "block", marginBottom: 14 }}>
            {tag} — {sub}
          </span>
          <div className={className} style={{ color: textColor }}>
            {lines.map((l, i) => <span key={i} style={{ display: "block" }}>{l}</span>)}
          </div>
          <p style={{ marginTop: 16, fontSize: "clamp(15px, 1.4vw, 19px)", fontWeight: 300, color: descColor, maxWidth: 480, lineHeight: 1.55, margin: layout === "bottom" ? "14px auto 0" : "14px 0 0" }}>
            {desc}
          </p>
        </div>
      );

      const imageBlock = (
        <div className="float" style={{ flex: layout === "right" ? "0 0 auto" : "unset", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Illustration />
        </div>
      );

      return (
        <div style={containerStyle}>
          {layout === "right" ? (
            <>
              {textBlock}
              {imageBlock}
            </>
          ) : (
            <>
              {imageBlock}
              {textBlock}
            </>
          )}
        </div>
      );
    }

    // ─── Dots ────────────────────────────────────────────────

    function Dots({ total, current, isDark, onGo }) {
      return (
        <div style={{ display: "flex", gap: 8 }}>
          {Array.from({ length: total }).map((_, i) => (
            <button key={i} onClick={() => onGo(i)} style={{
              width: i === current ? 20 : 8, height: 8, borderRadius: 4,
              border: "none", cursor: "pointer", padding: 0,
              background: i === current
                ? (isDark ? "#ffffff" : "#1d1d1f")
                : (isDark ? "rgba(255,255,255,0.3)" : "rgba(0,0,0,0.15)"),
              transition: "width 0.3s ease, background 0.3s ease",
            }} />
          ))}
        </div>
      );
    }

    function Arrow({ direction, onClick, isDark, disabled }) {
      return (
        <button onClick={onClick} disabled={disabled} style={{
          width: 44, height: 44, borderRadius: "50%", border: "none",
          cursor: disabled ? "default" : "pointer",
          background: isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.07)",
          color: isDark ? "#fff" : "#1d1d1f",
          fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
          opacity: disabled ? 0.25 : 1,
          transition: "opacity 0.2s, background 0.2s",
        }}>
          {direction === "left" ? "←" : "→"}
        </button>
      );
    }

    // ─── App ─────────────────────────────────────────────────

    function App() {
      const [current, setCurrent] = useState(0);
      const [dir, setDir] = useState("next");
      const total = headings.length;

      const go = (next) => {
        if (next === current) return;
        setDir(next > current ? "next" : "prev");
        setCurrent(next);
      };
      const prev = () => { if (current > 0) go(current - 1); };
      const next = () => { if (current < total - 1) go(current + 1); };

      useEffect(() => {
        const handler = (e) => {
          if (e.key === "ArrowRight") next();
          if (e.key === "ArrowLeft")  prev();
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [current]);

      const isDark = ["#000000", "#1d1d1f"].includes(headings[current].bg);

      return (
        <div style={{ height: "100vh", display: "flex", flexDirection: "column", fontFamily: FONT }}>

          {/* Nav */}
          <header style={{
            position: "absolute", top: 0, left: 0, right: 0, zIndex: 10, height: 48,
            background: isDark ? "rgba(0,0,0,0.6)" : "rgba(255,255,255,0.75)",
            backdropFilter: "blur(14px)",
            borderBottom: `1px solid ${isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)"}`,
            display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "0 24px",
            transition: "background 0.45s ease, border-color 0.45s ease",
          }}>
            <svg width="18" height="18" viewBox="0 0 814 1000" style={{ fill: isDark ? "#fff" : "#1d1d1f" }}>
              <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-166.5-123.8C138.3 797.3 98 737 98 689.5 98 624.4 142.7 561.7 246 523.7c48.3-17.4 99.8-25.3 134.2-25.3 10.9 0 46.7 0 72 14.8 23.4 13.2 55.3 37.5 103.7 37.5 44.8 0 79.3-28.5 106.6-44 35.2-20.4 76.3-26.4 124.5-26.4zm-24.6-161.4c0 101.6-75.5 182.8-166.3 182.8-2.7 0-5.4-.1-8.1-.3 2.7-95.6 81.8-172.7 166.3-172.7 2.7 0 5.4.1 8.1.2z"/>
            </svg>
            <span style={{ fontSize: 13, fontWeight: 500, color: isDark ? "#f5f5f7" : "#1d1d1f" }}>Heading Showcase</span>
            <span style={{ fontSize: 12, color: isDark ? "#a1a1a6" : "#6e6e73" }}>{current + 1} / {total}</span>
          </header>

          {/* Slides */}
          <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
            {headings.map((h, i) => (
              <Slide key={h.tag} slide={h} visible={i === current} dir={dir} />
            ))}
          </div>

          {/* Controls */}
          <div style={{
            position: "absolute", bottom: 32, left: 0, right: 0, zIndex: 10,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 20,
          }}>
            <Arrow direction="left"  onClick={prev} isDark={isDark} disabled={current === 0} />
            <Dots total={total} current={current} isDark={isDark} onGo={go} />
            <Arrow direction="right" onClick={next} isDark={isDark} disabled={current === total - 1} />
          </div>

          <div style={{
            position: "absolute", bottom: 10, left: 0, right: 0, textAlign: "center",
            fontSize: 11, color: isDark ? "rgba(255,255,255,0.25)" : "rgba(0,0,0,0.2)",
            letterSpacing: "0.04em",
          }}>
            ← → arrow keys to navigate
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
